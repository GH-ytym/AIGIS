<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · GIS Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css';">
  <link rel="stylesheet" href="/static/css/map.css?v=20260409a">
</head>
<body>
  <div id="map" class="map-canvas"></div>

  <section class="overlay-block left-debug-block" aria-label="POI 调试面板">
    <pre id="poiDebugPanel" class="debug-panel" aria-live="polite">调试信息：等待搜索...</pre>
  </section>

  <section class="overlay-block right-results-block" aria-label="POI 结果面板">
    <div id="poiResults" class="result-stack" aria-live="polite"></div>
    <button id="resultToggleBtn" class="result-toggle-btn" type="button" aria-expanded="true">收起结果</button>
  </section>

  <section class="overlay-block center-search-block" aria-label="POI 搜索入口">
    <div id="agentChatBubble" class="agent-chat-bubble is-hidden" aria-live="polite"></div>

    <div class="bottom-search-row">
      <div class="agent-search-shell bottom-search-shell">
        <div class="search-row agent-search-row">
          <input id="poiSearchInput" placeholder="{{ agent_placeholder or '想去哪里？我来帮你拆解任务' }}" aria-label="AI 助手输入">
          <button id="poiSearchBtn" type="button" aria-label="AI 助手执行">
            <svg viewBox="0 0 1024 1024" aria-hidden="true" width="30" height="30">
              <path d="M469.333333 768c-166.4 0-298.666667-132.266667-298.666666-298.666667s132.266667-298.666667 298.666666-298.666666 298.666667 132.266667 298.666667 298.666666-132.266667 298.666667-298.666667 298.666667z m0-85.333333c119.466667 0 213.333333-93.866667 213.333334-213.333334s-93.866667-213.333333-213.333334-213.333333-213.333333 93.866667-213.333333 213.333333 93.866667 213.333333 213.333333 213.333334z m251.733334 0l119.466666 119.466666-59.733333 59.733334-119.466667-119.466667 59.733334-59.733333z" fill="#29dad9"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="city-picker-wrap bottom-city-picker">
        <button
          id="cityPickerBtn"
          class="city-picker-trigger"
          type="button"
          aria-label="选择城市和区县"
          aria-expanded="false"
        >
          切换城市
        </button>
        <div id="cityPickerPanel" class="city-picker-panel hidden" role="dialog" aria-label="城市区县选择">
          <label class="picker-field" for="provinceSelect">
            <span>省/直辖市</span>
            <select id="provinceSelect" aria-label="选择省或直辖市"></select>
          </label>
          <label class="picker-field" for="citySelect">
            <span>地级市</span>
            <select id="citySelect" aria-label="选择地级市" disabled></select>
          </label>
          <label class="picker-field" for="districtSelect">
            <span>区县</span>
            <select id="districtSelect" aria-label="选择区县" disabled></select>
          </label>
          <button id="cityApplyBtn" class="city-apply-btn" type="button">切换到所选区县</button>
          <p id="cityPickerTip" class="city-picker-tip" aria-live="polite"></p>
        </div>
      </div>
    </div>

    <div id="citySwitchPrompt" class="city-switch-prompt hidden" aria-live="polite">
      <p id="citySwitchPromptText" class="city-switch-prompt-text">是否要切换城市到目标城市？</p>
      <div class="city-switch-actions">
        <button id="citySwitchYesBtn" class="city-switch-yes" type="button">是</button>
        <button id="citySwitchNoBtn" class="city-switch-no" type="button">否</button>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js';"></script>
  <script src="/static/js/map.js?v=20260409a"></script>
</body>
</html>
